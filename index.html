<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titi - Lector Inmersivo Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3131/3131614.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <main class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon">📖</div>
                <h2>Titi</h2>
            </div>
            
            <div class="card-control">
                <label class="control-label">Documento</label>
                <label for="subirArchivo" class="btn-upload">
                    <span>📄 Subir archivo (.txt, .pdf)</span>
                </label>
                <input type="file" id="subirArchivo" accept="text/plain, application/pdf" style="display: none;">
                <span id="nombreArchivo" class="file-name">Sin documento</span>
            </div>

            <div class="card-control">
                <label for="selectVoces" class="control-label">Voz del Asistente</label>
                <div class="select-wrapper">
                    <select id="selectVoces" class="custom-select">
                        <option>Cargando voces...</option>
                    </select>
                </div>
            </div>

            <div class="card-control">
                <div class="slider-header">
                    <label for="rangeVelocidad" class="control-label">Velocidad</label>
                    <span class="badge"><span id="valVelocidad">1.0</span>x</span>
                </div>
                <input type="range" id="rangeVelocidad" class="custom-slider" min="0.5" max="2" step="0.1" value="1.0">
            </div>

            <div class="card-control">
                <div class="slider-header">
                    <label for="rangeTono" class="control-label">Tono</label>
                    <span class="badge"><span id="valTono">1.0</span></span>
                </div>
                <input type="range" id="rangeTono" class="custom-slider" min="0" max="2" step="0.1" value="1.0">
            </div>

            <div class="visual-modes">
                <label class="control-label">Modos de Accesibilidad</label>
                <div class="toggle-group">
                    <button id="btnDislexia" class="btn-toggle">Modo Dislexia</button>
                    <button id="btnContraste" class="btn-toggle">Contraste</button>
                </div>
            </div>
        </aside>

        <section class="main-content">
            <header class="top-bar">
                <div class="titles">
                    <h1>Lector Inmersivo</h1>
                    <span class="pro-badge">PRO</span>
                </div>
                <div class="actions">
                    <button id="btnPlay" class="btn-primary play-btn">
                        <span class="icon">▶️</span> Leer / Reanudar
                    </button>
                    <button id="btnPause" class="btn-secondary stop-btn" title="Pausar">
                        <span class="icon">⏸️</span>
                    </button>
                    <button id="btnStop" class="btn-secondary stop-btn" title="Detener por completo">
                        <span class="icon">⏹️</span>
                    </button>
                </div>
            </header>

            <div class="editor-container">
                <textarea id="textoEntrada" placeholder="Escribe aquí, pega un texto o sube tu documento..."></textarea>
                <div id="vistaLectura" class="vista-lectura hidden"></div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
